name: build-data

on:
  push:
    branches: [main]
    paths:
      - 'shots/**'
      - 'logs/**'
      - 'meta/**'
      - 'beans/**'
      - 'grinders/**'
      - 'baskets/**'
      - 'puck-screens/**'
      - 'docs/build.py'
      - '.github/workflows/build-data.yml'

permissions:
  contents: write

concurrency:
  group: build-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python3 docs/build.py

      - name: Commit if changed
        run: |
          if git diff --quiet docs/data.json; then
            echo "No data.json changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "build: regenerate docs/data.json"
          git push
